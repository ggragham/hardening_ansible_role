---
- name: APT seccomp-bpf
  copy:
    src: debian_apt_sandbox.conf
    dest: /etc/apt/apt.conf.d/40sandbox.conf
    mode: 0640
  become: true
  when: HARDENING_DEBIAN_APT_SECCOMP_BPF_ENABLE | default(false) | bool

- name: Update Debian-based system
  apt:
    name: '*'
    state: latest
    update_cache: true
  become: true

- name: Autoremove unused pkgs
  apt:
    autoremove: true
    purge: true
  become: true

- name: Clean APT cache
  apt:
    autoclean: true
  become: true
